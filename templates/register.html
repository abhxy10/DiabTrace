{% extends "base.html" %}
{% block title %}Register - DiabTrace Analytics{% endblock %}
{% block content %}
<div class="container" style="max-width:500px;">
    <div class="card">
        <h2>Register New Account</h2>
        <p style="color:#666; font-size:0.85rem; margin-bottom:20px;">Create an account to use the diabetes risk prediction system.</p>
        <form method="POST">
            <div class="form-group">
                <label>Username:</label>
                <input type="text" name="username" placeholder="Choose a username" required>
            </div>
            <div class="form-group">
                <label>Password:</label>
                <input type="password" name="password" placeholder="Choose a password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%; padding:11px;">Register</button>
        </form>
        <p style="text-align:center; margin-top:15px; font-size:0.9rem;">
            Already have an account? <a href="{{ url_for('login') }}">Log in here</a>
        </p>
    </div>
</div>
{% endblock %}
