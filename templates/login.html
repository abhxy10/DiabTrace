{% extends "base.html" %}
{% block title %}Login - DiabTrace Analytics{% endblock %}
{% block content %}
<div class="container" style="max-width:500px;">
    <div class="card">
        <h2>Login</h2>
        <p style="color:#666; font-size:0.85rem; margin-bottom:20px;">Log in to access the diabetes risk prediction system.</p>
        <form method="POST">
            <div class="form-group">
                <label>Username:</label>
                <input type="text" name="username" placeholder="Enter your username" required>
            </div>
            <div class="form-group">
                <label>Password:</label>
                <input type="password" name="password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%; padding:11px;">Login</button>
        </form>
        <p style="text-align:center; margin-top:15px; font-size:0.9rem;">
            Don't have an account? <a href="{{ url_for('register') }}">Register here</a>
        </p>
    </div>
</div>
{% endblock %}
